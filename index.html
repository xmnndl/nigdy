    <style>
        /* ZMIENNE CSS: LIGHT MODE */
        :root {
            --brand-bg: #fcfcfc;
            --brand-grid: #e5e5e5;
            --brand-text: #111111;
            --glass-bg: rgba(15, 15, 20, 0.45);
            --glass-border: rgba(255, 255, 255, 0.05);
            --radius-large: 24px;
        }

        /* ZMIENNE CSS: DARK MODE */
        html.dark {
            --brand-bg: #0a0a0a;
            --brand-grid: #1a1a1a;
            --brand-text: #f0f0f0;
        }

        html, body {
            background-color: var(--brand-bg);
            color: var(--brand-text);
            cursor: none; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none; 
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* CUSTOMOWY KURSOR NEGATYWOWY */
        .cursor-dot {
            position: fixed;
            top: 0; left: 0;
            width: 14px; height: 14px;
            background-color: white; 
            border-radius: 50%;
            pointer-events: none; 
            z-index: 2147483647; 
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
            transition: width 0.3s cubic-bezier(0.25, 1, 0.5, 1), height 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease;
        }
        .cursor-hovering { width: 50px; height: 50px; }

        /* ZIARNO */
        .grain {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 2147483646; 
            pointer-events: none; overflow: hidden;
        }
        .grain::before {
            content: "";
            position: absolute; 
            top: -10rem; left: -10rem;
            width: calc(100% + 20rem); height: calc(100% + 20rem);
            background-image: url('https://thumbs.dreamstime.com/b/nenhuma-tev%C3%AA-do-sinal-textura-sem-emenda-com-efeito-granulado-ru%C3%ADdo-da-televis%C3%A3o-para-o-fundo-117039829.jpg');
            background-size: 250px; 
            mix-blend-mode: soft-light; 
            opacity: 0.09; filter: brightness(0.6) contrast(1.5);
            animation: noise 1s steps(2) infinite;
        }
        @keyframes noise {
            0% { transform: translate3d(0, 9rem, 0); }
            10% { transform: translate3d(-1rem, -4rem, 0); }
            20% { transform: translate3d(-8rem, 2rem, 0); }
            30% { transform: translate3d(9rem, -9rem, 0); }
            40% { transform: translate3d(-2rem, 7rem, 0); }
            50% { transform: translate3d(-9rem, -4rem, 0); }
            60% { transform: translate3d(2rem, 6rem, 0); }
            70% { transform: translate3d(7rem, -8rem, 0); }
            80% { transform: translate3d(-9rem, 1rem, 0); }
            90% { transform: translate3d(6rem, -5rem, 0); }
            100% { transform: translate3d(-7rem, 0, 0); }
        }

        /* SIATKA TŁA / POŚWIATA */
        .grid-bg-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; pointer-events: none;
            background-image: 
                linear-gradient(to right, var(--brand-grid) 1px, transparent 1px),
                linear-gradient(to bottom, var(--brand-grid) 1px, transparent 1px);
            background-size: 80px 80px;
            transition: background-image 0.4s ease;
        }
        .grid-glow {
            position: absolute; inset: 0; pointer-events: none;
            background: radial-gradient(circle 500px at var(--mouse-x, 50vw) var(--mouse-y, 50vh), rgba(0, 0, 0, 0.04), transparent 70%);
        }

        .perspective-container { perspective: 1000px; }
        .magnetic-wrap { display: inline-block; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* CLIP-PATH TIMER (BEZ-LUKOWY BĄBEL GSAP) */
        #bubble-portal {
            --rad: 0%;
            position: absolute;
            inset: 0; 
            width: 100%; height: 100%;
            background-color: #050505;
            pointer-events: auto;
            z-index: 1;
            clip-path: circle(var(--rad) at 50% 50%);
            -webkit-clip-path: circle(var(--rad) at 50% 50%);
        }

        /* GLASSMORPHISM - APPLE CARDS DLA OSTATECZNEJ STOPKI */
        .card-wrapper { perspective: 1000px; width: 100%; }
        .glass-link {
            position: relative; display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            width: 100%; height: 100%; padding: 30px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-large);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            transform-style: preserve-3d;
            transition: border-color 0.4s ease, background 0.4s ease, transform 0.2s ease-out, box-shadow 0.4s ease;
            box-shadow: -1px 0px 5px rgba(255, 0, 0, 0.05), 1px 0px 5px rgba(0, 255, 255, 0.05), 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden; color: #f0f0f0;
        }
        .glass-link::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(400px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 255, 255, 0.08), transparent 40%);
            z-index: 1; pointer-events: none; opacity: 0; transition: opacity 0.4s;
        }
        .card-wrapper:hover .glass-link::before { opacity: 1; }
        .card-wrapper:hover .glass-link {
            border-color: rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.03);
            box-shadow: -3px 0px 10px rgba(255, 0, 0, 0.2), 3px 0px 10px rgba(0, 255, 255, 0.2), 0 15px 35px rgba(0,0,0,0.6);
        }
        .glass-content-wrap {
            position: relative; z-index: 2; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between; transform: translateZ(30px);
        }
        
        .social-btn svg { width: 28px; height: 28px; fill: currentColor; transition: fill 0.3s ease, transform 0.3s ease; }

        .social-btn.discord:hover svg { fill: #5865F2; transform: translateY(-4px) scale(1.1); }
        .social-btn { cursor: none; pointer-events: auto; }

    <script>
        // --- THEME TOGGLE (Dark / Light) ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;

        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark'); 
            if(htmlElement.classList.contains('dark')) {
                themeToggleBtn.classList.replace('rotate-0', 'rotate-180');
            } else {
                themeToggleBtn.classList.replace('rotate-180', 'rotate-0');
            }
        });

        // --- LENIS.JS - APPLE SMOOTH SCROLL ---
        const lenis = new Lenis({
            duration: 1.2, 
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), 
            direction: 'vertical',
            smooth: true,
        });
        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);
        gsap.registerPlugin(ScrollTrigger);

        // --- KURSOR ORAZ LOGO POCHYŁ TILT 3D ---
        const cursor = document.getElementById('cursor-dot');
        let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
        let cursorX = window.innerWidth / 2, cursorY = window.innerHeight / 2;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            document.documentElement.style.setProperty('--mouse-x', `${mouseX}px`);
            document.documentElement.style.setProperty('--mouse-y', `${mouseY}px`);
            
            // Logika nowej siły myszki od GSAP - Mniej dramatyczne nachylenia aby "N" nam tak szybko się po prostopadłych ścianach znikało.
            const logo = document.getElementById('logo-3d');
            const rect = logo.getBoundingClientRect();
            const logoCenterX = rect.left + (rect.width / 2);
            const logoCenterY = rect.top + (rect.height / 2);

            const tiltMax = 12; // Zmienione by z dużego bliska się po prostu wygniatało szkłem, bez wielkich lewarów ucieczek horyzontalnych.
            const diffX = (mouseX - logoCenterX) / window.innerWidth;
            const diffY = (mouseY - logoCenterY) / window.innerHeight;

            gsap.to(logo, {
                rotationY: diffX * tiltMax * 2,  
                rotationX: diffY * -tiltMax * 2, 
                duration: 0.8,
                ease: 'power3.out'
            });
        });

        gsap.ticker.add(() => {
            const dt = 1.0 - Math.pow(1.0 - 0.2, gsap.ticker.deltaRatio());
            cursorX += (mouseX - cursorX) * dt;
            cursorY += (mouseY - cursorY) * dt;
            cursor.style.transform = `translate3d(${cursorX}px, ${cursorY}px, 0) translate(-50%, -50%)`;
        });

        const applyHoverEffect = () => {
            const triggers = document.querySelectorAll('.cursor-hover-trigger, .glass-link');
            triggers.forEach(el => {
                el.onmouseenter = () => cursor.classList.add('cursor-hovering');
                el.onmouseleave = () => cursor.classList.remove('cursor-hovering');
            });
        };

        // UKRYWAMY KURSOR NA RZECZ DOMYŚLNEJ RĘCZKI NAD IFRAME - pozwala łatwo naciskać play! 
        document.querySelectorAll('.spotify-embed-zone').forEach(zone => {
            zone.addEventListener('mouseenter', () => cursor.style.opacity = '0');
            zone.addEventListener('mouseleave', () => cursor.style.opacity = '1');
        });

        // --- MAGNETYCZNE "NIGDY" BEZ ZASŁONY LINI (Ruch po ekranie z odjazdem) ---
        const magnetText = document.getElementById('magnetic-text');
        const magnetWrap = document.querySelector('.magnetic-wrap');

        magnetWrap.addEventListener('mousemove', (e) => {
            const bound = magnetWrap.getBoundingClientRect();
            const relX = e.clientX - bound.left - bound.width / 2;
            const relY = e.clientY - bound.top - bound.height / 2;
            
            gsap.to(magnetText, {
                x: relX * 0.4, y: relY * 0.4, rotation: relX * 0.05,
                duration: 0.4, ease: "power2.out"
            });
        });
        magnetWrap.addEventListener('mouseleave', () => {
            gsap.to(magnetText, { x: 0, y: 0, rotation: 0, duration: 1, ease: "elastic.out(1, 0.3)" });
        });

        // --- PIOSENKA DNIA API Z "daily.js" ---
        if (typeof todayTrackId !== 'undefined') {
            const songWrapper = document.getElementById('song-of-the-day-container');
            setTimeout(() => {
                songWrapper.innerHTML = `
                    <iframe style="border-radius:12px; width: 100%; height: 100%; pointer-events: auto;" 
                        src="https://open.spotify.com/embed/track/${todayTrackId}?utm_source=generator&theme=0" 
                        frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
                    </iframe>
                `;
                songWrapper.classList.remove('bg-black/5', 'dark:bg-white/5');
            }, 1000); 
        }

        // --- BAZOWY STOPER CZYSTY ---
        const targetDate = new Date('2026-07-01T18:00:00+02:00').getTime();
        const fd = val => val < 10 ? `0${val}` : val; 

        setInterval(() => {
            const distance = targetDate - new Date().getTime();
            if (distance < 0) return;
            document.getElementById('cd-days').innerText = fd(Math.floor(distance / 86400000));
            document.getElementById('cd-hours').innerText = fd(Math.floor((distance % 86400000) / 3600000));
            document.getElementById('cd-mins').innerText = fd(Math.floor((distance % 3600000) / 60000));
            document.getElementById('cd-secs').innerText = fd(Math.floor((distance % 60000) / 1000));
        }, 1000);

        // --- GSAP ANIMACJE IN / EFEKT PORTALU BEZ-BŁĘDNY. ---
        gsap.utils.toArray('.fade-in-hero').forEach(i => gsap.from(i, { opacity: 0, y: 30, duration: 1.5, delay: 0.1, ease: "power3.out" }));
        gsap.utils.toArray('.fade-in-scroll').forEach(i => gsap.from(i, { scrollTrigger: { trigger: i, start: "top 85%" }, y: 50, opacity: 0, duration: 1.2, ease: "expo.out" }));

        // Animacja Clip-Path na wklejenie się z podłogi sekcji Tiktoka
        const bubbleTl = gsap.timeline({
            scrollTrigger: {
                trigger: '#timer-pin-wrapper',
                start: 'top top', 
                end: '+=150%', // Podwiesza blok na czas wkraczania stopek. Pozbywa to Luki Paskowej.
                pin: true,     // Przybij gładziutko do sufitu. W GSAP nie psuje to dom jak zrobiony clip
                scrub: 1, 
            }
        });

        // 1. Zwykła i cicha rotacja z poszerzeniem koła bez psucia struktury css. (wartość clip at na zmiennnej)
        bubbleTl.to('#bubble-portal-layer', {
            clipPath: 'circle(150% at 50% 50%)', 
            webkitClipPath: 'circle(150% at 50% 50%)', 
            ease: 'power2.inOut',
            duration: 1
        }, 0);

        // 2. Wejscie blur tekstu na sam koniec
        bubbleTl.to('#timer-text-content', {
            opacity: 1, 
            filter: 'blur(0px)',
            ease: 'power1.out',
            duration: 0.5 
        }, 0.4); 

        // --- SOCIALS RENDER KART I 3D EFEKTY SZKLA APPLE ---
        if (typeof socialsData !== 'undefined' && socialsData.length === 4) {
            
            if (typeof discordLink !== 'undefined' && discordLink) {
                 document.getElementById('master-discord-btn').href = discordLink;
            }

            const socContainer = document.getElementById('socials-container');
            let socHtml = '';
            
            const svgInsta = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>`;
            const svgYT = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`;
            const svgTik = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.04-.1z"/></svg>`;

            socialsData.forEach(p => {
                socHtml += `
                    <div class="card-wrapper w-full aspect-square sm:aspect-[4/3] rounded-[24px]">
                        <div class="glass-link cursor-hover-trigger z-20 relative pointer-events-auto">
                            <div class="glass-content-wrap pointer-events-none">
                                <h3 class="text-xl md:text-2xl font-bold uppercase tracking-widest text-center mt-6">${p.name}</h3>
                                <div class="flex justify-center gap-6 mb-8 w-full z-20 pointer-events-auto">
                                    <a href="${p.instagram}" target="_blank" class="social-btn insta pointer-events-auto" aria-label="Insta"><span class="w-8 h-8 block pointer-events-none">${svgInsta}</span></a>
                                    <a href="${p.youtube}" target="_blank" class="social-btn youtube pointer-events-auto" aria-label="YT"><span class="w-8 h-8 block pointer-events-none">${svgYT}</span></a>
                                    <a href="${p.tiktok}" target="_blank" class="social-btn tiktok pointer-events-auto" aria-label="TikTok"><span class="w-8 h-8 block pointer-events-none">${svgTik}</span></a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            socContainer.innerHTML = socHtml;

            // FIZYKA SZKLANYCH KART - Ruch obrotowy by nadać realizm perspektywie karty. Zmianą jest obcięty pointer-event w div.
            document.querySelectorAll('.card-wrapper').forEach(wrapper => {
                const link = wrapper.querySelector('.glass-link');
                wrapper.addEventListener('mousemove', (e) => {
                    const rect = wrapper.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;

                    link.style.setProperty('--mouse-x', `${x}px`);
                    link.style.setProperty('--mouse-y', `${y}px`);

                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = ((y - centerY) / centerY) * -12; 
                    const rotateY = ((x - centerX) / centerX) * 12;

                    link.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                });
                wrapper.addEventListener('mouseleave', () => {
                    link.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                });
            });

            applyHoverEffect(); // Spędza nowe przyciski do tablic dla nadmuszkiwania rozmiaru
        }
    </script>
</body>
</html>
